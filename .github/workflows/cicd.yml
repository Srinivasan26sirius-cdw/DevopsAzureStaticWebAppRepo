name: Deploy web app to Azure Static Web Apps

env:
  APP_LOCATION: "/" 
  OUTPUT_LOCATION: "dist" 

on:
  push:
    branches:
      - main
      - develop


jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build-${{ matrix.os }}
          path: ./dist

  test:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
      
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-build-${{ matrix.os }}
          path: ./dist

      - name: Run tests
        run: npm test -- --watchAll=false

  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_SMOKE_055E5150F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: ${{ env.APP_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
          skip_api_build: true

      - name: Print deployment status
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "Deployed to production Azure Static Web App"
          elif [ "${GITHUB_REF}" = "refs/heads/develop" ]; then
            echo "Deployed to development Azure Static Web App"
          else
            echo "No deployment for this branch: ${GITHUB_REF} !!!!!"
          fi